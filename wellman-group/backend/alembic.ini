# Alembic Configuration File for Wellman Group Backend
# FastAPI + SQLAlchemy 2.0 + PostgreSQL

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(utc_now_datetime)s_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current working directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to dateutil.tz.gettz()
# leaving as UTC should result in UTC datetime objects being imported
# from datetime for all .py files generated, as opposed to
# datetime.datetime.utcnow() calls included in the templates
# timezone =

# max length of characters to apply to the
# "slug" field
# set to 40 to truncate long migration names to 40
# char length
# truncate_slug_len = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# set to 'true' to skip the source tree traversals
# that scan for python files when discovering migrations
# in directories such as 'versions'.  This is useful if
# there are many non-revision files stored in such
# directories.  defaults to 'false'.
# ignore_patterns = (?!^model_|^revision_).*?\.py

# Logging configuration
# The SQLAlchemy URL is not needed here; it's loaded from app.core.config
sqlalchemy.url = driver://user:password@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that get executed
# after generating a new revision file.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# lint using "flake8" - use the console_scripts runner, against the "flake8" entrypoint
# hooks = flake8
# flake8.type = console_scripts
# flake8.entrypoint = flake8
# flake8.options = --max-line-length 79 REVISION_SCRIPT_FILENAME

# mypy
# hooks = mypy.Main
# mypy.type = python
# mypy.module_name = mypy
# mypy.params = REVISION_SCRIPT_FILENAME --ignore-missing-imports --show-error-codes
